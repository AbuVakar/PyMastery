# Judge0 CE Configuration
# Generated for PyMastery self-hosted deployment

# ─────────────────────────────────────
# PostgreSQL
# ─────────────────────────────────────
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=YourSecretDBPassword1234

# ─────────────────────────────────────
# Redis
# ─────────────────────────────────────
REDIS_PASSWORD=YourSecretRedis1234

# ─────────────────────────────────────
# Judge0 Settings
# ─────────────────────────────────────
# How long to wait for a submission (seconds)
CPU_TIME_LIMIT=5
CPU_EXTRA_TIME=1
WALL_TIME_LIMIT=10
MEMORY_LIMIT=128000
STACK_LIMIT=64000
MAX_PROCESSES_AND_OR_THREADS=60
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false
MAX_FILE_SIZE=1024

# ─────────────────────────────────────
# Server
# ─────────────────────────────────────
# No authentication needed for self-hosted
ENABLE_BATCHED_SUBMISSIONS=true
MAX_SUBMISSION_BATCH_SIZE=20
SUBMISSION_CACHE_DURATION=1
