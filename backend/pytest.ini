[tool:pytest]
# Pytest configuration for PyMastery Backend

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --strict-config
    --tb=short
    --maxfail=10
    --durations=10

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require external services)
    api: API endpoint tests
    performance: Performance and load tests
    security: Security vulnerability tests
    slow: Slow running tests (run separately)
    smoke: Smoke tests (critical functionality)
    regression: Regression tests

# Minimum version
minversion = 6.0

# Test session configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage configuration
[coverage:run]
source = backend
omit = 
    */tests/*
    */venv/*
    */env/*
    */__pycache__/*
    */migrations/*
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == "__main__":
    class .*\(Protocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov
title = PyMastery Backend Coverage Report

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:Type google\._upb\._message\.(MessageMapContainer|ScalarMapContainer) uses PyType_Spec.*:DeprecationWarning
    ignore::UserWarning:distutils
    error:::mypy
